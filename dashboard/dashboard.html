<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard | CameraOn</title>

    <link rel="icon" href="../branding/logo.jpg" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../styles/itonStyle.css">

    <style>
        .gold-accent { color: #d4af37; }
        .bg-overlay { background-color: rgba(0, 0, 0, 0.90); }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4af37; }
    </style>
</head>

<body class="h-full bg-black bg-[url('../branding/brand-photo.jpg')] bg-fixed bg-cover bg-center bg-no-repeat bg-blend-overlay bg-overlay text-white font-[Montserrat]">

<nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-gray-900">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="../branding/logo.jpg" alt="CameraOn Logo" class="w-10 h-10 rounded-lg object-cover border border-gray-800">
            <h1 class="text-xl font-bold" style="font-family: 'Playfair Display', serif;">CameraOn <span class="text-[#d4af37]">Portal</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <a href="../book/Book.html" class="hidden md:block text-sm font-semibold gold-accent hover:text-white transition">New Booking +</a>
            <div class="h-6 w-px bg-gray-800 hidden md:block"></div>
            <button onclick="logout()" class="text-sm text-gray-400 hover:text-white transition flex items-center gap-2">
                <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </button>
        </div>
    </div>
</nav>

<main class="pt-28 pb-20 px-4 max-w-7xl mx-auto h-full flex flex-col">

    <div class="mb-12 animate-in">
        <h2 id="welcome-text" class="text-4xl md:text-5xl font-black mb-2" style="font-family: 'Playfair Display', serif;">Welcome back, Client</h2>
        <p class="text-gray-400">Manage your upcoming sessions and view your history.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <div class="lg:col-span-2 space-y-6">
            <h3 class="text-2xl font-bold border-b border-gray-800 pb-3" style="font-family: 'Playfair Display', serif;">
                <i class="fa-regular fa-calendar-check text-[#d4af37] mr-2"></i> Upcoming Sessions
            </h3>

            <div id="upcoming-container" class="space-y-4">
                <div class="text-gray-500 flex items-center gap-3">
                    <i class="fa-solid fa-circle-notch fa-spin text-[#d4af37]"></i> Loading your itinerary...
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <h3 class="text-2xl font-bold border-b border-gray-800 pb-3 text-gray-400" style="font-family: 'Playfair Display', serif;">
                <i class="fa-solid fa-clock-rotate-left mr-2"></i> Past Sessions
            </h3>

            <div id="history-container" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                <div class="text-gray-600 text-sm">Retrieving history...</div>
            </div>
        </div>

    </div>
</main>

<script>
    const API_BASE_URL = window.location.hostname === "localhost"
        ? "http://localhost:5000"
        : "https://cameraon-backend.onrender.com";

    const upcomingContainer = document.getElementById('upcoming-container');
    const historyContainer = document.getElementById('history-container');
    const welcomeText = document.getElementById('welcome-text');

    function formatDateTime(sqlTimestamp) {
        const date = new Date(sqlTimestamp);
        return {
            date: date.toLocaleDateString('en-ZA', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' }),
            time: date.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' })
        };
    }

    function createBookingCard(booking, isHistory = false) {
        const start = formatDateTime(booking.startDate);
        const end = formatDateTime(booking.endDate);

        const cardClasses = isHistory
            ? "bg-gray-950/50 border border-gray-900 rounded-xl p-5 relative opacity-75"
            : "bg-gray-950 border border-gray-800 rounded-xl p-6 shadow-xl relative overflow-hidden transition hover:border-gray-600";

        const accentLine = isHistory ? "" : '<div class="absolute top-0 left-0 w-1 h-full bg-[#d4af37]"></div>';

        return `
                <div class="${cardClasses}">
                    ${accentLine}
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-xs font-bold uppercase tracking-wider ${isHistory ? 'text-gray-600' : 'text-[#d4af37]'}">${booking.service}</span>
                            <h4 class="text-xl font-bold text-white mt-1">${booking.venue}</h4>
                        </div>
                        ${!isHistory ? '<span class="bg-[#d4af37]/10 text-[#d4af37] text-xs font-bold px-3 py-1 rounded-full">Confirmed</span>' : ''}
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm text-gray-400">
                        <div class="flex items-center gap-2">
                            <i class="fa-regular fa-calendar w-4 text-center"></i>
                            ${start.date}
                        </div>
                        <div class="flex items-center gap-2">
                            <i class="fa-regular fa-clock w-4 text-center"></i>
                            ${start.time} - ${end.time}
                        </div>
                        <div class="flex items-center gap-2 sm:col-span-2">
                            <i class="fa-solid fa-location-dot w-4 text-center"></i>
                            Location coordinated via ${booking.venue}
                        </div>
                    </div>

                    ${!isHistory ? `
                    <div class="mt-5 pt-4 border-t border-gray-800 flex gap-3">
                        <button class="text-sm font-semibold text-white bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded transition">Reschedule</button>
                        <button onclick="cancelSession(${booking.email},${booking.venue}, ${booking.startDate})" class="text-sm font-semibold text-red-400 hover:text-red-300 px-4 py-2 transition">Cancel</button>
                    </div>` : ''}
                </div>
            `;
    }

    async function loadDashboard() {
        try {
            const dashResponse = await fetch(`${API_BASE_URL}/api/private/dashboard-data`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include' // <--- SENDS THE COOKIE TO THE BOUNCER
            });

            const data = await dashResponse.json();
            const bookings = data.bookings;
            const userName = data.user.name;

            welcomeText.innerHTML = `Welcome back, <span class="text-[#d4af37]">${userName}</span>`;

            const now = new Date();
            const upcoming = [];
            const history = [];

            bookings.forEach(booking => {
                const bookingEnd = new Date(booking.endDate);
                if (bookingEnd >= now) {
                    upcoming.push(booking);
                    console.log('here');
                } else {
                    history.push(booking);
                }
            });

            console.log(upcoming);

            if (upcoming.length > 0) {
                upcoming.sort((a, b) => new Date(a.startDate) - new Date(b.endDate));
                upcomingContainer.innerHTML = upcoming.map(b => createBookingCard(b, false)).join('');
            } else {
                upcomingContainer.innerHTML = `
                        <div class="bg-gray-900/50 border border-gray-800 border-dashed rounded-xl p-8 text-center">
                            <p class="text-gray-400 mb-4">You have no upcoming sessions.</p>
                            <a href="../book/Book.html" class="text-[#d4af37] font-bold hover:text-white transition">Book a session now &rarr;</a>
                        </div>`;
            }

            if (history.length > 0) {
                history.sort((a, b) => new Date(b.startDate) - new Date(a.endDate));
                historyContainer.innerHTML = history.map(b => createBookingCard(b, true)).join('');
            } else {
                historyContainer.innerHTML = '<p class="text-gray-600 text-sm">No past sessions found.</p>';
            }

        } catch (error) {
            console.error("Failed to load dashboard:", error);
            upcomingContainer.innerHTML = '<p class="text-red-400">Failed to load data. Please refresh.</p>';
            historyContainer.innerHTML = '';
        }
    }

    async function cancelSession(bookingEmail, bookingVenue, startDate) {
        if (!confirm("Are you sure you want to cancel this session?")) return;

        try {
            // NOTE: If you update your backend to use the booking ID (e.g., /api/private/bookings/{id}),
            // you will want to swap this URL structure out for that cleaner approach!
            const response = await fetch(`${API_BASE_URL}/api/private/bookings?email=${encodeURIComponent(bookingEmail)}&venue=${encodeURIComponent(bookingVenue)}&date=${encodeURIComponent(startDate)}`, {
                method: 'DELETE',
                credentials: 'include' // Send the JWT cookie!
            });

            if (response.ok) {
                // Reload the dashboard to show the updated list!
                await loadDashboard();
            } else {
                alert("Failed to cancel booking.");
            }
        } catch (error) {
            console.error(error);
        }
    }

    function logout() {
        window.location.href = '../login/login.html';
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
